# =============================================================================
# POC AAP - GCP | Variables Globales
# Archivo : vars/cis_vars.yml
# =============================================================================

# --- Configuracion SMTP para reportes por email ---
smtp_host: "smtp.tudominio.com"       # Cambia por tu servidor SMTP
smtp_port: 587
email_remitente: "aap-poc@tudominio.com"
email_destinatario: "admin@tudominio.com"

# --- Puertos permitidos en firewalld ---
puertos_permitidos:
  - { port: "22", proto: "tcp", descripcion: "SSH" }
  - { port: "80", proto: "tcp", descripcion: "HTTP Web" }
  - { port: "443", proto: "tcp", descripcion: "HTTPS Web" }
  - { port: "8080", proto: "tcp", descripcion: "App Server" }
  - { port: "1521", proto: "tcp", descripcion: "Oracle XE DB" }

# --- Configuracion SSH ---
ssh_config_path: "/etc/ssh/sshd_config"

# --- Rutas de logs y reportes ---
audit_report_path: "/tmp"