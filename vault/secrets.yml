# =============================================================================
# vault/secrets.yml — BLOQUE ADICIONAL: User Lifecycle Module
# IMPORTANTE: Este archivo debe estar cifrado con Ansible Vault
# Comando: ansible-vault encrypt vault/secrets.yml
# =============================================================================

# --- Credenciales Active Directory ---
# Completar cuando el dominio esté definido (Fase 2 del POC)
vault_ad_domain: "PENDIENTE"            # Ej: CORP
vault_ad_domain_fqdn: "PENDIENTE"       # Ej: corp.local
vault_ad_dc_hostname: "PENDIENTE"       # Ej: DC01
vault_ad_admin_user: "PENDIENTE"        # Ej: Administrator
vault_ad_admin_password: "PENDIENTE"    # Contraseña del admin AD

# --- Credenciales Linux (Oracle Linux - targets del POC) ---
vault_linux_admin_user: "ansible_svc"   # Service account del AAP Controller
vault_linux_admin_key: |
  -----BEGIN OPENSSH PRIVATE KEY-----
  PENDIENTE_LLAVE_SSH
  -----END OPENSSH PRIVATE KEY-----

# --- Configuración SMTP para reportes por email ---
vault_smtp_host: "smtp.empresa.com"
vault_smtp_port: 587
vault_smtp_user: "PENDIENTE"
vault_smtp_password: "PENDIENTE"
vault_email_sender: "aap-poc@empresa.com"
vault_email_recipient: "supervisor@empresa.com"

# --- Credenciales GCP Service Account (para inventario dinámico futuro) ---
vault_gcp_project: "PENDIENTE"
vault_gcp_sa_email: "PENDIENTE"