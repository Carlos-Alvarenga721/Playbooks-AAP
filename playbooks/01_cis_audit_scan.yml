---
# =============================================================================
# POC AAP - GCP | Hardening CIS Benchmark Level 1
# Playbook    : 01_cis_audit_scan.yml
# Descripcion : Auditoría de estado actual del servidor RHEL 9
#               (Web + App + DB Oracle XE). NO realiza cambios.
# Autor       : AAP POC Team
# SO Target   : RHEL 9
# =============================================================================

- name: "CIS Benchmark Level 1 - Auditoria de Cumplimiento RHEL 9"
  hosts: rhel9_servers
  gather_facts: true
  become: true

  vars_files:
    - ../vars/cis_vars.yml

  vars:
    audit_timestamp: "{{ ansible_date_time.date }}_{{ ansible_date_time.hour }}{{ ansible_date_time.minute }}"
    audit_results: []

  tasks:

    # =========================================================================
    # CONTROL 1 - SEGURIDAD DE ACCESO SSH
    # CIS: Bloquear acceso root directo y autenticacion por password
    # =========================================================================

    - name: "[SSH] Verificar si PermitRootLogin esta deshabilitado"
      ansible.builtin.shell: >-
        grep -Ei "^\s*PermitRootLogin\s+(no|prohibit-password)" /etc/ssh/sshd_config
      register: ssh_root_check
      changed_when: false
      failed_when: false

    - name: "[SSH] Verificar si PasswordAuthentication esta deshabilitado"
      ansible.builtin.shell: >-
        grep -Ei "^\s*PasswordAuthentication\s+no" /etc/ssh/sshd_config
      register: ssh_password_check
      changed_when: false
      failed_when: false

    - name: "[SSH] Registrar CIS-1.1 PermitRootLogin"
      ansible.builtin.set_fact:
        audit_results: >-
          {{ audit_results + [{'control': 'CIS-1.1', 'categoria': 'Seguridad SSH', 'descripcion': 'PermitRootLogin deshabilitado', 'estado': ('CUMPLE' if ssh_root_check.rc == 0 else 'NO CUMPLE'), 'detalle': (ssh_root_check.stdout if ssh_root_check.rc == 0 else 'PermitRootLogin no configurado correctamente')}] }}

    - name: "[SSH] Registrar CIS-1.2 PasswordAuthentication"
      ansible.builtin.set_fact:
        audit_results: >-
          {{ audit_results + [{'control': 'CIS-1.2', 'categoria': 'Seguridad SSH', 'descripcion': 'PasswordAuthentication deshabilitado', 'estado': ('CUMPLE' if ssh_password_check.rc == 0 else 'NO CUMPLE'), 'detalle': (ssh_password_check.stdout if ssh_password_check.rc == 0 else 'PasswordAuthentication no configurado correctamente')}] }}

    # =========================================================================
    # CONTROL 2 - PERIMETRO DE RED (FIREWALL)
    # CIS: firewalld activo con solo puertos esenciales abiertos
    # Puertos permitidos: SSH(22), HTTP(80), HTTPS(443), App(8080), Oracle(1521)
    # =========================================================================

    - name: "[FIREWALL] Verificar si firewalld esta activo y habilitado"
      ansible.builtin.systemd:
        name: firewalld
      register: firewalld_status
      changed_when: false
      failed_when: false

    - name: "[FIREWALL] Obtener puertos y servicios activos en firewalld"
      ansible.builtin.shell: >-
        firewall-cmd --list-all 2>/dev/null || echo "firewalld_no_disponible"
      register: firewall_rules
      changed_when: false
      failed_when: false

    - name: "[FIREWALL] Registrar CIS-2.1 firewalld activo"
      ansible.builtin.set_fact:
        audit_results: >-
          {{ audit_results + [{'control': 'CIS-2.1', 'categoria': 'Perimetro de Red', 'descripcion': 'firewalld activo y habilitado', 'estado': ('CUMPLE' if firewalld_status.status.ActiveState == 'active' else 'NO CUMPLE'), 'detalle': 'Estado actual: ' + firewalld_status.status.ActiveState}] }}

    - name: "[FIREWALL] Registrar CIS-2.2 reglas configuradas"
      ansible.builtin.set_fact:
        audit_results: >-
          {{ audit_results + [{'control': 'CIS-2.2', 'categoria': 'Perimetro de Red', 'descripcion': 'Reglas de firewall configuradas', 'estado': ('CUMPLE' if 'firewalld_no_disponible' not in firewall_rules.stdout else 'NO CUMPLE'), 'detalle': firewall_rules.stdout[:200]}] }}

    # =========================================================================
    # CONTROL 3 - TRAZABILIDAD Y AUDITORIA (auditd)
    # CIS: auditd activo con reglas sobre archivos criticos del sistema
    # =========================================================================

    - name: "[AUDITD] Verificar si auditd esta activo y habilitado"
      ansible.builtin.systemd:
        name: auditd
      register: auditd_status
      changed_when: false
      failed_when: false

    - name: "[AUDITD] Verificar reglas de auditoria cargadas"
      ansible.builtin.shell: >-
        auditctl -l 2>/dev/null | grep -c "." || echo "0"
      register: audit_rules_count
      changed_when: false
      failed_when: false

    - name: "[AUDITD] Registrar CIS-3.1 auditd activo"
      ansible.builtin.set_fact:
        audit_results: >-
          {{ audit_results + [{'control': 'CIS-3.1', 'categoria': 'Trazabilidad y Auditoria', 'descripcion': 'Servicio auditd activo', 'estado': ('CUMPLE' if auditd_status.status.ActiveState == 'active' else 'NO CUMPLE'), 'detalle': 'Estado actual: ' + auditd_status.status.ActiveState}] }}

    - name: "[AUDITD] Registrar CIS-3.2 reglas de auditoria"
      ansible.builtin.set_fact:
        audit_results: >-
          {{ audit_results + [{'control': 'CIS-3.2', 'categoria': 'Trazabilidad y Auditoria', 'descripcion': 'Reglas de auditoria cargadas', 'estado': ('CUMPLE' if audit_rules_count.stdout | int > 0 else 'NO CUMPLE'), 'detalle': 'Reglas activas encontradas: ' + audit_rules_count.stdout}] }}

    # =========================================================================
    # CONTROL 4 - GESTION DE EVIDENCIA (LOGGING - rsyslog)
    # CIS: rsyslog activo para recoleccion de logs del sistema
    # =========================================================================

    - name: "[RSYSLOG] Verificar si rsyslog esta activo y habilitado"
      ansible.builtin.systemd:
        name: rsyslog
      register: rsyslog_status
      changed_when: false
      failed_when: false

    - name: "[RSYSLOG] Verificar archivo de configuracion principal"
      ansible.builtin.stat:
        path: /etc/rsyslog.conf
      register: rsyslog_conf

    - name: "[RSYSLOG] Registrar CIS-4.1 rsyslog activo"
      ansible.builtin.set_fact:
        audit_results: >-
          {{ audit_results + [{'control': 'CIS-4.1', 'categoria': 'Gestion de Evidencia', 'descripcion': 'Servicio rsyslog activo', 'estado': ('CUMPLE' if rsyslog_status.status.ActiveState == 'active' else 'NO CUMPLE'), 'detalle': 'Estado actual: ' + rsyslog_status.status.ActiveState}] }}

    - name: "[RSYSLOG] Registrar CIS-4.2 archivo de configuracion"
      ansible.builtin.set_fact:
        audit_results: >-
          {{ audit_results + [{'control': 'CIS-4.2', 'categoria': 'Gestion de Evidencia', 'descripcion': 'Archivo de configuracion rsyslog presente', 'estado': ('CUMPLE' if rsyslog_conf.stat.exists else 'NO CUMPLE'), 'detalle': '/etc/rsyslog.conf existe: ' + (rsyslog_conf.stat.exists | string)}] }}

    # =========================================================================
    # CONTROL 5 - SINCRONIZACION DE TIEMPO (NTP - chronyd)
    # CIS: chronyd activo para marcas de tiempo precisas en auditorias
    # =========================================================================

    - name: "[CHRONYD] Verificar si chronyd esta activo y habilitado"
      ansible.builtin.systemd:
        name: chronyd
      register: chronyd_status
      changed_when: false
      failed_when: false

    - name: "[CHRONYD] Verificar sincronizacion de tiempo actual"
      ansible.builtin.shell: >-
        chronyc tracking 2>/dev/null | grep "System time" || echo "No sincronizado"
      register: chrony_sync
      changed_when: false
      failed_when: false

    - name: "[CHRONYD] Registrar CIS-5.1 chronyd activo"
      ansible.builtin.set_fact:
        audit_results: >-
          {{ audit_results + [{'control': 'CIS-5.1', 'categoria': 'Sincronizacion de Tiempo', 'descripcion': 'Servicio chronyd activo', 'estado': ('CUMPLE' if chronyd_status.status.ActiveState == 'active' else 'NO CUMPLE'), 'detalle': 'Estado actual: ' + chronyd_status.status.ActiveState}] }}

    - name: "[CHRONYD] Registrar CIS-5.2 sincronizacion NTP"
      ansible.builtin.set_fact:
        audit_results: >-
          {{ audit_results + [{'control': 'CIS-5.2', 'categoria': 'Sincronizacion de Tiempo', 'descripcion': 'Sincronizacion NTP verificada', 'estado': ('CUMPLE' if 'No sincronizado' not in chrony_sync.stdout else 'NO CUMPLE'), 'detalle': chrony_sync.stdout}] }}

    # =========================================================================
    # RESUMEN FINAL DEL SCAN
    # =========================================================================

    - name: "Calcular controles que CUMPLEN"
      ansible.builtin.set_fact:
        total_controles: "{{ audit_results | length }}"
        controles_cumplen: "{{ audit_results | selectattr('estado', 'equalto', 'CUMPLE') | list | length }}"
        controles_no_cumplen: "{{ audit_results | selectattr('estado', 'equalto', 'NO CUMPLE') | list | length }}"

    - name: "Guardar resultados de auditoria en archivo JSON"
      ansible.builtin.copy:
        content: "{{ audit_results | to_nice_json }}"
        dest: "/tmp/cis_audit_{{ audit_timestamp }}.json"
        mode: '0644'

    - name: "Mostrar resumen de auditoria en consola AAP"
      ansible.builtin.debug:
        msg:
          - "============================================"
          - "  REPORTE CIS AUDIT - {{ ansible_hostname }}"
          - "  Fecha   : {{ ansible_date_time.date }}"
          - "  SO      : {{ ansible_distribution }} {{ ansible_distribution_version }}"
          - "============================================"
          - "  Total controles evaluados : {{ total_controles }}"
          - "  CUMPLEN                   : {{ controles_cumplen }}"
          - "  NO CUMPLEN                : {{ controles_no_cumplen }}"
          - "  Resultado JSON en         : /tmp/cis_audit_{{ audit_timestamp }}.json"
          - "============================================"

    - name: "Enviar reporte de auditoria por email"
      ansible.builtin.mail:
        host: "{{ smtp_host }}"
        port: "{{ smtp_port }}"
        to: "{{ email_destinatario }}"
        from: "{{ email_remitente }}"
        subject: "[AAP POC] Reporte CIS Audit - {{ ansible_hostname }} - {{ ansible_date_time.date }}"
        body: |
          ============================================
          REPORTE DE AUDITORIA CIS BENCHMARK LEVEL 1
          ============================================
          Servidor   : {{ ansible_hostname }}
          IP         : {{ ansible_default_ipv4.address }}
          SO         : {{ ansible_distribution }} {{ ansible_distribution_version }}
          Fecha      : {{ ansible_date_time.date }} {{ ansible_date_time.time }}
          --------------------------------------------
          RESUMEN DE CUMPLIMIENTO
          --------------------------------------------
          Total evaluados  : {{ total_controles }}
          CUMPLEN          : {{ controles_cumplen }}
          NO CUMPLEN       : {{ controles_no_cumplen }}
          --------------------------------------------
          DETALLE POR CONTROL
          --------------------------------------------
          {% for item in audit_results %}
          [{{ item.estado }}] {{ item.control }} - {{ item.descripcion }}
            Categoria : {{ item.categoria }}
            Detalle   : {{ item.detalle }}
          {% endfor %}
          --------------------------------------------
          * Este reporte fue generado automaticamente por AAP POC GCP
          * Para remediar los controles fallidos ejecute: 02_cis_remediation.yml
          ============================================