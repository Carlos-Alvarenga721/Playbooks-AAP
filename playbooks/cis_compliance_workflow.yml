---
# Workflow: CIS Compliance completo
# Ejecuta auditoría, remediación y generación de reporte en secuencia

- name: CIS Compliance - Audit Scan
  import_playbook: 01_cis_audit_scan.yml

- name: CIS Compliance - Remediation
  import_playbook: 02_cis_remediation.yml

- name: CIS Compliance - Generate Report
  hosts: rhel9_servers
  become: true
  gather_facts: false

  vars_files:
    - ../vars/cis_vars.yml

  roles:
    - cis_reporting
