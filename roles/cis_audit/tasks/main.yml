# Tareas principales del rol cis_audit

- name: Crear directorio de resultados de auditoría
  ansible.builtin.file:
    path: "{{ cis_audit_output_dir }}"
    state: directory
    mode: '0750'

- name: Ejecutar auditoría CIS nivel {{ cis_audit_level }}
  ansible.builtin.debug:
    msg: "Ejecutando auditoría CIS nivel {{ cis_audit_level }} en {{ inventory_hostname }}"
