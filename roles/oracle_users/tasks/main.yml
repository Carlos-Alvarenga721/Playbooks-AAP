---
- name: Validar accion Oracle soportada
  ansible.builtin.assert:
    that:
      - oracle_action in ['create', 'update', 'delete']
    fail_msg: "oracle_action debe ser create, update o delete."

- name: Validar usuario Oracle requerido
  ansible.builtin.assert:
    that:
      - oracle_username | length > 0
    fail_msg: "oracle_username es obligatorio."

- name: Validar conexion Oracle requerida
  ansible.builtin.assert:
    that:
      - oracle_hostname | length > 0
      - oracle_service_name | length > 0
    fail_msg: "oracle_hostname y oracle_service_name son obligatorios."

- name: Validar password Oracle para create/update
  ansible.builtin.assert:
    that:
      - oracle_password | length > 0
    fail_msg: "oracle_password es obligatorio para create o update."
  when: oracle_action in ['create', 'update']

- name: Gestionar usuario Oracle
  community.general.oracle_user:
    hostname: "{{ oracle_hostname }}"
    port: "{{ oracle_port }}"
    service_name: "{{ oracle_service_name }}"
    mode: "{{ oracle_mode }}"
    schema: "{{ oracle_username }}"
    schema_password: "{{ oracle_password if oracle_action in ['create', 'update'] else omit }}"
    profile: "{{ oracle_profile }}"
    default_tablespace: "{{ oracle_default_tablespace }}"
    temporary_tablespace: "{{ oracle_temp_tablespace }}"
    grants: "{{ oracle_grants }}"
    append_grants: "{{ oracle_append_grants }}"
    update_password: "{{ oracle_password_update }}"
    state: "{{ oracle_user_state[oracle_action] }}"

