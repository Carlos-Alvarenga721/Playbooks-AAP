---
- name: "AD | Crear usuario en Active Directory"
  ansible.windows.win_powershell:
    script: |
      $password = ConvertTo-SecureString "{{ employee_password }}" -AsPlainText -Force
      New-ADUser `
        -Name "{{ employee_full_name }}" `
        -SamAccountName "{{ employee_username }}" `
        -UserPrincipalName "{{ employee_username }}@{{ ad_domain }}" `
        -AccountPassword $password `
        -Enabled $true `
        -ErrorAction Stop
  register: ad_create_result
  failed_when:
    - ad_create_result.error | length > 0
    - "'already exists' not in (ad_create_result.error | join(' '))"

- name: "AD | Agregar usuario al grupo"
  ansible.windows.win_powershell:
    script: |
      Add-ADGroupMember `
        -Identity "{{ employee_role }}" `
        -Members "{{ employee_username }}" `
        -ErrorAction Stop