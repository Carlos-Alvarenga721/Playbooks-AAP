---
- name: "DEBUG | Verificar Python y winrm"
  ansible.builtin.shell: |
    python3 -c "import winrm; print(winrm.__file__)" 2>&1 || echo "winrm no encontrado"
    python3 --version
    whoami
  register: debug_output

- name: "DEBUG | Mostrar resultado"
  ansible.builtin.debug:
    msg: "{{ debug_output.stdout_lines }}"

- name: "AD | Crear usuario en Active Directory"
  community.windows.win_domain_user:
    name: "{{ employee_username }}"
    firstname: "{{ employee_full_name.split()[0] }}"
    surname: "{{ employee_full_name.split()[1] }}"
    password: "{{ employee_password }}"
    state: present
    enabled: true
    groups:
      - "{{ employee_role }}"
    update_password: on_create